<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mane Enterprises</title>

<style>
body{font-family:Poppins;margin:0;background:#f8f6f3}

/* FILTER BUTTONS */
.filters{
text-align:center;
margin:20px;
}
.filters button{
padding:10px 15px;
margin:5px;
border:none;
background:#5a3e2b;
color:white;
border-radius:20px;
cursor:pointer;
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}
.card img{
width:100%;
height:180px;
object-fit:cover;
}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
text-align:center;
}

.popup img{
width:100%;
}

/* WHATSAPP */
.btn{
background:#25D366;
padding:10px;
display:inline-block;
margin-top:10px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Mane Enterprises</h2>

<!-- FILTER -->
<div class="filters">
<button onclick="filter('all')">All</button>
<button onclick="filter('wardrobe')">Wardrobes</button>
<button onclick="filter('kitchen')">Kitchen</button>
<button onclick="filter('bed')">Beds</button>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card wardrobe" onclick="openPopup(['images/work1.jpg','images/work2.jpg'],'Wardrobe','Premium wardrobes with strong build')">
<img src="images/work1.jpg">
</div>

<div class="card kitchen" onclick="openPopup(['images/work3.jpg'],'Kitchen','Modern kitchen trolley designs')">
<img src="images/work3.jpg">
</div>

<div class="card bed" onclick="openPopup(['images/work4.jpg'],'Bed','Storage beds with durability')">
<img src="images/work4.jpg">
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">

<img id="popup-img">

<h3 id="title"></h3>
<p id="desc"></p>

<a id="whatsapp" class="btn">Enquire on WhatsApp</a>

<br><br>
<button onclick="closePopup()">Close</button>

</div>
</div>

<script>
let images=[],index=0;

function openPopup(imgArray,title,desc){
images=imgArray;
index=0;
document.getElementById('popup').style.display='flex';
document.getElementById('popup-img').src=images[index];
document.getElementById('title').innerText=title;
document.getElementById('desc').innerText=desc;

let msg=encodeURIComponent("I want this design: "+title);
document.getElementById('whatsapp').href="https://wa.me/919999999999?text="+msg;
}

function closePopup(){
document.getElementById('popup').style.display='none';
}

function filter(cat){
let cards=document.querySelectorAll('.card');
cards.forEach(c=>{
c.style.display=(cat=='all'||c.classList.contains(cat))?'block':'none';
});
}
</script>

</body>
</html>
