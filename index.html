<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mane Enterprises | Furniture</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{background:#f8f6f3;color:#3e2c23;}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px 30px;
background:#5a3e2b;
color:white;
position:sticky;
top:0;
}

/* HERO */
.hero{
height:70vh;
background:url('images/furniture-bg.png') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
position:relative;
}
.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}
.hero div{
position:relative;
z-index:2;
}

/* SECTION */
.section{padding:40px 20px;text-align:center;}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}
.card:hover{transform:scale(1.05);}
.card img{
width:100%;
height:180px;
object-fit:cover;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.popup-content{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
text-align:center;
}

.popup-content img{
width:100%;
border-radius:10px;
}

.close{
cursor:pointer;
color:red;
font-size:20px;
margin-top:10px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:white;
}
</style>
</head>

<body>

<header>
<h2>Mane Enterprises</h2>
</header>

<section class="hero">
<div>
<h1>Premium Furniture</h1>
<p>Vaibhavwadi, Sindhudurg</p>
</div>
</section>

<!-- PRODUCTS -->
<section class="section">
<h2>Our Work</h2>

<div class="products">

<div class="card" onclick="openPopup('images/work1.jpg','Wardrobe','We provide premium quality wardrobes with modern design and durable materials.')">
<img src="images/work1.jpg">
<h3>Wardrobes</h3>
</div>

<div class="card" onclick="openPopup('images/work2.jpg','Kitchen Trolley','Our kitchen trolleys are designed for maximum storage and long-lasting quality.')">
<img src="images/work2.jpg">
<h3>Kitchen</h3>
</div>

<div class="card" onclick="openPopup('images/work3.jpg','Modular Kitchen','We create stylish modular kitchens with smart space utilization.')">
<img src="images/work3.jpg">
<h3>Kitchen Setup</h3>
</div>

<div class="card" onclick="openPopup('images/work4.jpg','Bed Storage','Strong and spacious storage beds for modern homes.')">
<img src="images/work4.jpg">
<h3>Beds</h3>
</div>

</div>

</section>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">
<img id="popup-img">
<h3 id="popup-title"></h3>
<p id="popup-desc"></p>
<div class="close" onclick="closePopup()">Close</div>
</div>
</div>

<a href="https://wa.me/919999999999" class="whatsapp">💬</a>

<script>
function openPopup(img,title,desc){
document.getElementById('popup').style.display='flex';
document.getElementById('popup-img').src=img;
document.getElementById('popup-title').innerText=title;
document.getElementById('popup-desc').innerText=desc;
}

function closePopup(){
document.getElementById('popup').style.display='none';
}
</script>

</body>
</html>
